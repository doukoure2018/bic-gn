name: CD Frontend - Build & Deploy React

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bicgn-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bicgn-frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/bicgn-api
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bicgn-frontend:latest
            docker compose up -d --no-deps --force-recreate bicgn-frontend
            docker image prune -f
            echo "Frontend deployed at $(date)"
