name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'migrations/**'
      - 'requirements.txt'
      - 'Dockerfile'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'migrations/**'
      - 'requirements.txt'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check imports
        run: python -c "from app.main import app; print(f'OK - {len(app.routes)} routes')"
